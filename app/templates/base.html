<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mahesh Rajendra - AI/ML Engineer specializing in healthcare analytics, machine learning, and data engineering">
    <meta name="keywords" content="AI Engineer, ML Engineer, Machine Learning, Healthcare Analytics, Data Science">
    <meta name="author" content="Mahesh Rajendra">
    
    <title>{% block title %}Mahesh Rajendra | AI/ML Engineer{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine.js for interactivity -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#00ff88',
                        secondary: '#00ccff',
                        dark: {
                            900: '#0a0a0a',
                            800: '#111111',
                            700: '#1a1a1a',
                            600: '#222222',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out',
                        'slide-down': 'slideDown 0.6s ease-out',
                        'glow': 'glow 2s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        slideDown: {
                            '0%': { transform: 'translateY(-30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        glow: {
                            '0%, 100%': { boxShadow: '0 0 20px rgba(0, 255, 136, 0.3)' },
                            '50%': { boxShadow: '0 0 40px rgba(0, 255, 136, 0.6)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background: #0a0a0a;
            color: #ffffff;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Space Grotesk', sans-serif;
        }
        
        ::selection {
            background: #00ff88;
            color: #0a0a0a;
        }
        
        /* Grid background */
        .grid-bg {
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        
        /* Gradient text */
        .text-gradient {
            background: linear-gradient(135deg, #00ff88 0%, #00ccff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Smooth scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #111111;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #00ff88;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-dark-900 text-white">
    <!-- Grid Background -->
    <div class="fixed inset-0 grid-bg pointer-events-none z-0"></div>
    
    <!-- Gradient Orbs -->
    <div class="fixed top-0 right-0 w-[600px] h-[600px] bg-primary rounded-full blur-[150px] opacity-10 pointer-events-none -translate-y-1/2 translate-x-1/2"></div>
    <div class="fixed bottom-0 left-0 w-[600px] h-[600px] bg-secondary rounded-full blur-[150px] opacity-10 pointer-events-none translate-y-1/2 -translate-x-1/2"></div>
    
    <div class="relative z-10">
        {% block content %}{% endblock %}
    </div>

    <!-- Floating Chat Widget -->
    <div x-data="chatWidget()" class="fixed bottom-6 right-6 z-50">
        <!-- Chat Panel -->
        <div x-show="open"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-90 translate-y-4"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-90 translate-y-4"
             class="mb-4 w-80 sm:w-96 bg-dark-800 border border-dark-600 rounded-2xl shadow-2xl shadow-primary/10 overflow-hidden flex flex-col"
             style="height: 480px;">

            <!-- Header -->
            <div class="bg-dark-700 border-b border-dark-600 px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center text-dark-900 font-bold text-sm">MR</div>
                    <div>
                        <div class="text-sm font-bold">Ask about Mahesh</div>
                        <div class="text-xs text-primary">AI Assistant</div>
                    </div>
                </div>
                <button @click="open = false" class="text-gray-400 hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Messages -->
            <div x-ref="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3" style="scrollbar-width: thin;">
                <!-- Welcome message -->
                <template x-if="messages.length === 0">
                    <div class="bg-dark-700 rounded-xl rounded-tl-none px-4 py-3 text-sm text-gray-300 max-w-[85%]">
                        Hi! I'm Mahesh's AI assistant. Ask me anything about his experience, skills, or projects.
                    </div>
                </template>

                <template x-for="(msg, index) in messages" :key="index">
                    <div :class="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
                        <div :class="msg.role === 'user'
                            ? 'bg-primary/20 border border-primary/30 text-white rounded-xl rounded-tr-none'
                            : 'bg-dark-700 text-gray-300 rounded-xl rounded-tl-none'"
                             class="px-4 py-3 text-sm max-w-[85%]">
                            <span x-text="msg.content"></span>
                        </div>
                    </div>
                </template>

                <!-- Typing indicator -->
                <div x-show="loading" class="flex justify-start">
                    <div class="bg-dark-700 rounded-xl rounded-tl-none px-4 py-3">
                        <div class="flex gap-1">
                            <span class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 0ms"></span>
                            <span class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 150ms"></span>
                            <span class="w-2 h-2 bg-primary rounded-full animate-bounce" style="animation-delay: 300ms"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="border-t border-dark-600 p-3">
                <form @submit.prevent="sendMessage" class="flex gap-2">
                    <input
                        x-model="input"
                        :disabled="loading"
                        type="text"
                        placeholder="Ask about Mahesh..."
                        class="flex-1 px-4 py-2 bg-dark-700 border border-dark-600 rounded-lg text-sm focus:border-primary focus:ring-1 focus:ring-primary/20 outline-none transition">
                    <button
                        type="submit"
                        :disabled="loading || !input.trim()"
                        :class="loading || !input.trim() ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105'"
                        class="px-3 py-2 bg-gradient-to-r from-primary to-secondary text-dark-900 rounded-lg transition-all duration-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>

        <!-- Chat Bubble -->
        <button @click="open = !open"
                :class="open ? 'scale-0' : 'scale-100'"
                class="w-14 h-14 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center shadow-lg shadow-primary/30 hover:scale-110 hover:shadow-primary/50 transition-all duration-300 animate-glow">
            <svg class="w-6 h-6 text-dark-900" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
            </svg>
        </button>
    </div>

    <script>
        function chatWidget() {
            return {
                open: false,
                input: '',
                messages: [],
                loading: false,

                async sendMessage() {
                    const text = this.input.trim();
                    if (!text || this.loading) return;

                    this.messages.push({ role: 'user', content: text });
                    this.input = '';
                    this.loading = true;
                    this.scrollToBottom();

                    try {
                        const response = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                message: text,
                                history: this.messages.slice(-6)
                            })
                        });

                        const data = await response.json();
                        this.messages.push({ role: 'assistant', content: data.answer });
                    } catch (error) {
                        this.messages.push({ role: 'assistant', content: 'Sorry, something went wrong. Please try again.' });
                    } finally {
                        this.loading = false;
                        this.scrollToBottom();
                    }
                },

                scrollToBottom() {
                    this.$nextTick(() => {
                        const el = this.$refs.chatMessages;
                        if (el) el.scrollTop = el.scrollHeight;
                    });
                }
            }
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
